name: Check
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  editorconfig-check:
    name: EditorConfig Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install EditorConfig checker
        uses: editorconfig-checker/action-editorconfig-checker@main

      - name: Run EditorConfig checker
        run: editorconfig-checker --exclude '(^LICENSE|^apps/server/drizzle/.*$)'

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v22

  syncpack:
    name: Syncpack Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # To resolve: ✗ Node.js v22.6.0 or higher is needed for a TypeScript config file
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install dependencies
        run: bun install syncpack

      - name: Run Syncpack
        run: bun run syncpack

  bun-check:
    name: Bun Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build API
        run: bun run build:api

      - name: Run checks
        run: turbo run quality
